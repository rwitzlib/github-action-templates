on:
  workflow_call:
    inputs:
      runs_on:
        type: string
        required: false
        default: ubuntu-latest
      region:
        type: string
        required: false
        default: us-east-2
      environment:
        type: string
        required: true
        default: dev
      docker:
        type: string
        required: true
      solution_directory:
        type: string
        required: true
      global_json_file:
        type: string
        required: true
      terraform_directory:
        type: string
        required: true
      terraform_variables:
        type: string
        required: false
        description: "JSON string of the variables to pass to the terraform plan"
        default: ""

jobs:
  build:
    runs-on: ${{ inputs.runs_on }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Dotnet Build
        uses: rwitzlib/github-action-templates/.github/actions/dotnet-build@v1.4.1
        with:
          project_directory: ${{ inputs.solution_directory }}
          global_json_file: ${{ inputs.global_json_file }}
        env:
          AWS_REGION: ${{ inputs.region || 'us-east-2' }}
          AWS_DEPLOYMENT_ROLE: ${{ secrets.AWS_DEPLOYMENT_ROLE }}
          
  docker:
    runs-on: ${{ inputs.runs_on }}
    permissions:
      id-token: write
      contents: read
    strategy:
      matrix:
        cfg: ${{ fromJson(inputs.docker) }}
    steps:
      - name: Docker Build Push
        uses: rwitzlib/github-action-templates/.github/actions/docker-build-push@v1.0.0
        with:
          ecr_repo: ${{ matrix.cfg.ecr_repo }}
          dockerfile: ${{ matrix.cfg.dockerfile }}
          context: ${{ matrix.cfg.context }}
          build-args: ${{ matrix.cfg.build-args }}
        env:
          AWS_REGION: ${{ inputs.region || 'us-east-2' }}
          AWS_DEPLOYMENT_ROLE: ${{ secrets.AWS_DEPLOYMENT_ROLE }}

  terraform_validate:
    runs-on: ${{ inputs.runs_on }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          mask-aws-account-id: true
          role-duration-seconds: 900
          role-to-assume: ${{ secrets.AWS_DEPLOYMENT_ROLE }}
          role-session-name: gha-lad-${{ github.run_id }}
          aws-region: ${{ inputs.region || 'us-east-2' }}
          
      - name: Terraform Setup
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Validate
        working-directory: ${{ inputs.terraform_directory }}
        run: |
          terraform init -backend-config="./backend/${{ inputs.environment }}.tfbackend"
          terraform validate

  terraform_plan:
    runs-on: ${{ inputs.runs_on }}
    needs: 
      - build
      - docker
      - terraform_validate
    concurrency:
      group: ${{ github.repository }}
      cancel-in-progress: false
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          mask-aws-account-id: true
          role-duration-seconds: 900
          role-to-assume: ${{ secrets.AWS_DEPLOYMENT_ROLE }}
          role-session-name: gha-${{ github.run_id }}
          aws-region: ${{ inputs.region || 'us-east-2' }}

      - name: Terraform Setup
        uses: hashicorp/setup-terraform@v4
      
      - name: Setup Terraform Variables
        working-directory: ${{ inputs.terraform_directory }}
        run: |
          echo "$${{ inputs.terraform_variables }}" | jq -r 'to_entries | .[] | "\(.key) = \(.value)"' >> ${{ inputs.environment }}.tfvars
  
      - name: Terraform Plan
        working-directory: ${{ inputs.terraform_directory }}
        run: |
          terraform init -backend-config="./backend/${{ inputs.environment }}.tfbackend"
          terraform validate
          terraform plan -input=false -var-file="./${{ inputs.environment }}.tfvars" -out ./final.tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ inputs.environment }}
          path: ${{ inputs.terraform_directory }}/final.tfplan
          if-no-files-found: error
          retention-days: 1

  terraform_apply:
    needs: terraform_plan
    runs-on: ${{ inputs.runs_on }}
    permissions:
      id-token: write
      contents: read
    if: github.event_name == 'workflow_dispatch' || github.ref_name == 'master'
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          mask-aws-account-id: true
          role-duration-seconds: 900
          role-to-assume: ${{ secrets.AWS_DEPLOYMENT_ROLE }}
          role-session-name: gha-${{ github.run_id }}
          aws-region: ${{ inputs.region || 'us-east-2' }}

      - name: Terraform Setup
        uses: hashicorp/setup-terraform@v4

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ inputs.environment }}
          path: ${{ inputs.terraform_directory }}

      - name: Terraform Apply
        working-directory: ${{ inputs.terraform_directory }}
        run: |
          terraform init -backend-config="./backend/${{ inputs.environment }}.tfbackend"
          terraform apply -auto-approve ./final.tfplan