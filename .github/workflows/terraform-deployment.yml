on:
  workflow_call:
    inputs:
      runs_on:
        type: string
        required: false
        default: ubuntu-latest
      region:
        type: string
        required: false
        default: us-east-2
      environment:
        type: string
        required: true
      terraform_directory:
        type: string
        required: false
        default: ./tf
      terraform_variables:
        type: string
        required: false
        description: "JSON string of the variables to pass to the terraform plan"
        default: '{}'

jobs:
  terraform_plan:
    runs-on: ${{ inputs.runs_on }}
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          mask-aws-account-id: true
          role-duration-seconds: 900
          role-to-assume: ${{ secrets.AWS_DEPLOYMENT_ROLE }}
          role-session-name: gha-${{ github.run_id }}
          aws-region: ${{ inputs.region || 'us-east-2' }}

      - name: Terraform Setup
        uses: hashicorp/setup-terraform@v4
      
      - name: Export Terraform secrets
        shell: bash
        env:
          SECRETS_JSON: ${{ toJSON(secrets) }}
        run: |
          while IFS='=' read -r key value; do
            suffix="${key#TF_VAR_}"
            printf 'TF_VAR_%s=%s\n' "${suffix,,}" "$value"
          done < <(
            echo "$SECRETS_JSON" |
              jq -r 'to_entries[]
                | select(.key | startswith("TF_VAR_"))
                | "\(.key)=\(.value)"'
          ) >> "$GITHUB_ENV"

      - name: Setup Terraform Variables
        working-directory: ${{ inputs.terraform_directory }}
        env:
          TERRAFORM_VARIABLES: ${{ inputs.terraform_variables }}
        run: |
          printf '%s' "$TERRAFORM_VARIABLES" |
            jq -r 'to_entries[] | "\(.key) = \(.value | @json)"' \
            >> "${{ inputs.environment }}.tfvars"
  
      - name: Terraform Plan
        working-directory: ${{ inputs.terraform_directory }}
        run: |
          terraform init -backend-config="./backend/${{ inputs.environment }}.tfbackend"
          terraform validate
          terraform plan -input=false -var-file="./${{ inputs.environment }}.tfvars" -out ./final.tfplan

      - name: Upload Terraform Plan
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ inputs.environment }}
          path: ${{ inputs.terraform_directory }}/final.tfplan
          if-no-files-found: error
          retention-days: 1

  terraform_apply:
    needs: terraform_plan
    runs-on: ${{ inputs.runs_on }}
    permissions:
      id-token: write
      contents: read
    if: github.event_name == 'workflow_dispatch' || github.ref_name == 'master'
    environment: ${{ inputs.environment }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          mask-aws-account-id: true
          role-duration-seconds: 900
          role-to-assume: ${{ secrets.AWS_DEPLOYMENT_ROLE }}
          role-session-name: gha-${{ github.run_id }}
          aws-region: ${{ inputs.region || 'us-east-2' }}

      - name: Terraform Setup
        uses: hashicorp/setup-terraform@v4

      - name: Download Terraform Plan
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ inputs.environment }}
          path: ${{ inputs.terraform_directory }}

      - name: Terraform Apply
        if: github.event_name == 'workflow_dispatch' || github.ref_name == 'master'
        working-directory: ${{ inputs.terraform_directory }}
        run: |
          terraform init -backend-config="./backend/${{ inputs.environment }}.tfbackend"
          terraform apply -auto-approve ./final.tfplan
